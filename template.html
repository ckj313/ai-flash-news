<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI快报 - 每日精选</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #888; font-size: 1rem; }
        .last-update { color: #666; font-size: 0.85rem; margin-top: 10px; }
        
        .day-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .day-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .day-date {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00d4ff;
        }
        .day-count {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .article {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .article:last-child { border-bottom: none; }
        .article-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .article-title a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.2s;
        }
        .article-title a:hover { color: #00d4ff; }
        .article-desc {
            color: #999;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .article-desc strong { color: #c77dff; }
        .article-desc em { color: #00d4ff; font-style: italic; }
        .article-desc code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.85rem;
        }
        footer a { color: #00d4ff; }
        
        .rss-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,165,0,0.2);
            color: #ffa500;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-decoration: none;
            margin-top: 15px;
        }
        .rss-badge:hover { background: rgba(255,165,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI快报</h1>
            <p class="subtitle">每日 AI 技术资讯精选</p>
            <a href="https://tech.armyja-online.uk/rss" class="rss-badge" target="_blank">
                <span>📡</span> RSS 源
            </a>
            <p class="last-update">最后更新：{{UPDATE_TIME}}</p>
        </header>
        
        <main id="content">
            {{CONTENT}}
        </main>
        
        <footer>
            <p>数据来源：<a href="https://tech.armyja-online.uk/rss" target="_blank">AI快报</a></p>
            <p style="margin-top:8px;">由 OpenClaw 自动更新 · 每日 9:00</p>
        </footer>
    </div>
</body>
</html>
